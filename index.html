<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warsaw Road Trip Planner</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  body.dark { background: #0f172a; color: #e2e8f0; }
  body.light { background: #f8fafc; color: #1e293b; }
  #app { display: flex; height: 100vh; }

  /* Sidebar */
  #sidebar { width: 420px; min-width: 420px; overflow-y: auto; display: flex; flex-direction: column; }
  body.dark #sidebar { background: #1e293b; border-right: 1px solid #334155; }
  body.light #sidebar { background: #ffffff; border-right: 1px solid #e2e8f0; }
  #sidebar h1 { font-size: 1.3rem; padding: 20px 20px 8px; letter-spacing: -0.02em; }
  body.dark #sidebar h1 { color: #f8fafc; }
  body.light #sidebar h1 { color: #0f172a; }
  #sidebar .subtitle { padding: 0 20px 16px; font-size: 0.85rem; }
  body.dark .subtitle { color: #94a3b8; }
  body.light .subtitle { color: #64748b; }

  /* Controls row */
  .controls-row { display: flex; gap: 8px; padding: 0 20px 12px; flex-wrap: wrap; }

  /* Toggle buttons — 2×2 grid */
  .toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 20px 12px; }
  .toggle-btn {
    padding: 9px 10px; border: 2px solid transparent;
    border-radius: 10px; cursor: pointer; font-size: 0.78rem;
    font-weight: 600; transition: all 0.2s; text-align: center;
  }
  body.dark .toggle-btn { background: #0f172a; }
  body.light .toggle-btn { background: #f1f5f9; }
  .toggle-btn:hover { filter: brightness(1.08); }

  /* Per-trip toggle colors driven by CSS custom properties */
  .toggle-btn { color: var(--tc); border-color: var(--tb); }
  .toggle-btn.active { background: var(--ta); border-color: var(--tc); }

  .ctrl-btn {
    padding: 7px 12px; border-radius: 8px; border: 1.5px solid;
    cursor: pointer; font-size: 0.75rem; font-weight: 600;
    transition: all 0.15s; display: flex; align-items: center; gap: 5px;
  }
  body.dark .ctrl-btn { background: #0f172a; border-color: #334155; color: #94a3b8; }
  body.light .ctrl-btn { background: #f1f5f9; border-color: #cbd5e1; color: #475569; }
  .ctrl-btn:hover { filter: brightness(1.15); }
  .ctrl-btn.active-ctrl { border-color: #f59e0b; color: #f59e0b; }
  body.light .ctrl-btn.active-ctrl { border-color: #d97706; color: #d97706; }

  /* Compare table */
  .compare-section { padding: 0 20px 4px; }
  .compare-section summary {
    font-size: 0.75rem; font-weight: 600; cursor: pointer; padding: 4px 0 8px; list-style: none;
  }
  .compare-section summary::before { content: '▸ '; }
  .compare-section[open] summary::before { content: '▾ '; }
  body.dark .compare-section summary { color: #94a3b8; }
  body.light .compare-section summary { color: #64748b; }

  .compare-bar {
    display: flex; gap: 1px; margin-bottom: 6px;
    border-radius: 8px; overflow: hidden; font-size: 0.7rem;
  }
  body.dark .compare-bar { background: #334155; }
  body.light .compare-bar { background: #e2e8f0; }
  .compare-bar .col { flex: 1; padding: 6px 8px; }
  body.dark .compare-bar .col { background: #1e293b; }
  body.light .compare-bar .col { background: #ffffff; }
  .compare-bar .col.label { font-weight: 600; min-width: 80px; flex: 0 0 80px; }
  body.dark .compare-bar .col.label { color: #94a3b8; }
  body.light .compare-bar .col.label { color: #64748b; }

  /* Day cards */
  .day-list { flex: 1; padding: 0 20px 20px; }
  .day-card {
    border-radius: 10px; padding: 14px 16px;
    margin-bottom: 10px; border-left: 3px solid var(--tc);
    cursor: pointer; transition: all 0.15s;
  }
  body.dark .day-card { background: #0f172a; }
  body.light .day-card { background: #f8fafc; }
  body.dark .day-card:hover, body.dark .day-card.active { background: #1a2744; }
  body.light .day-card:hover, body.light .day-card.active { background: #e0f2fe; }

  .day-card .day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 6px; }
  .day-card .day-num { font-weight: 700; font-size: 0.9rem; color: var(--tc); white-space: nowrap; }
  .day-card .day-drive { font-size: 0.72rem; padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
  body.dark .day-card .day-drive { color: #64748b; background: #1e293b; }
  body.light .day-card .day-drive { color: #64748b; background: #e2e8f0; }
  .day-card .day-place { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
  body.dark .day-card .day-place { color: #f1f5f9; }
  body.light .day-card .day-place { color: #0f172a; }
  .day-card .day-desc { font-size: 0.8rem; line-height: 1.45; }
  body.dark .day-card .day-desc { color: #94a3b8; }
  body.light .day-card .day-desc { color: #475569; }

  .activity-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
  .tag.cycling { background: #064e3b; color: #6ee7b7; }
  .tag.hiking  { background: #78350f; color: #fbbf24; }
  .tag.city    { background: #312e81; color: #a5b4fc; }
  .tag.drive   { background: #1e293b; color: #64748b; }
  body.light .tag.cycling { background: #d1fae5; color: #065f46; }
  body.light .tag.hiking  { background: #fef3c7; color: #92400e; }
  body.light .tag.city    { background: #e0e7ff; color: #3730a3; }
  body.light .tag.drive   { background: #e2e8f0; color: #64748b; }

  #map { flex: 1; }

  .legend {
    position: absolute; bottom: 24px; right: 24px; z-index: 1000;
    backdrop-filter: blur(8px); padding: 12px 16px; border-radius: 10px; font-size: 0.78rem;
  }
  body.dark .legend { background: rgba(30,41,59,0.92); border: 1px solid #334155; color: #e2e8f0; }
  body.light .legend { background: rgba(255,255,255,0.92); border: 1px solid #e2e8f0; color: #1e293b; }
  .legend div { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .legend div:last-child { margin-bottom: 0; }
  .legend .dot { width: 10px; height: 10px; border-radius: 50%; }

  .section-header { font-size: 0.78rem; font-weight: 700; padding: 12px 0 6px; margin-bottom: 8px; }
  body.dark .section-header { border-bottom: 1px solid #334155; }
  body.light .section-header { border-bottom: 1px solid #e2e8f0; }

  .weather-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 0.72rem; font-weight: 600;
    padding: 3px 9px; border-radius: 99px; white-space: nowrap; margin-left: auto;
  }
  body.dark .weather-badge { background: #1e293b; color: #94a3b8; }
  body.light .weather-badge { background: #e2e8f0; color: #475569; }
  .weather-badge .wx-icon { font-size: 0.9rem; line-height: 1; }
  .weather-badge .wx-temp { font-weight: 700; }
  body.dark .weather-badge .wx-temp { color: #e2e8f0; }
  body.light .weather-badge .wx-temp { color: #1e293b; }
  .weather-badge .wx-range { font-weight: 500; opacity: 0.6; font-size: 0.9em; }

  .day-date { font-weight: 500; font-size: 0.78rem; margin-left: 6px; }
  body.dark .day-date { color: #64748b; }
  body.light .day-date { color: #94a3b8; }
</style>

const WMO = {
  0:{icon:'☀️',label:'Clear'},1:{icon:'🌤️',label:'Mostly clear'},2:{icon:'⛅',label:'Partly cloudy'},
  3:{icon:'☁️',label:'Overcast'},45:{icon:'🌫️',label:'Fog'},48:{icon:'🌫️',label:'Rime fog'},
  51:{icon:'🌦️',label:'Light drizzle'},53:{icon:'🌦️',label:'Drizzle'},55:{icon:'🌧️',label:'Heavy drizzle'},
  56:{icon:'🌧️',label:'Freezing drizzle'},57:{icon:'🌧️',label:'Freezing drizzle'},
  61:{icon:'🌧️',label:'Light rain'},63:{icon:'🌧️',label:'Rain'},65:{icon:'🌧️',label:'Heavy rain'},
  66:{icon:'🌧️',label:'Freezing rain'},67:{icon:'🌧️',label:'Freezing rain'},
  71:{icon:'🌨️',label:'Light snow'},73:{icon:'🌨️',label:'Snow'},75:{icon:'❄️',label:'Heavy snow'},
  77:{icon:'🌨️',label:'Snow grains'},80:{icon:'🌦️',label:'Rain showers'},81:{icon:'🌧️',label:'Rain showers'},
  82:{icon:'⛈️',label:'Heavy showers'},85:{icon:'🌨️',label:'Snow showers'},86:{icon:'❄️',label:'Heavy snow'},
  95:{icon:'⛈️',label:'Thunderstorm'},96:{icon:'⛈️',label:'T-storm + hail'},99:{icon:'⛈️',label:'T-storm + hail'}
};
function getWMO(code) { return WMO[code] || { icon:'🌡️', label:'' }; }

const TRIP_START = '2026-04-18';
function tripDate(dayNum) {
  const d = new Date(TRIP_START + 'T00:00:00');
  d.setDate(d.getDate() + (dayNum - 1));
  return d.toISOString().slice(0, 10);
}
function tripDateLabel(dayNum) {
  const d = new Date(TRIP_START + 'T00:00:00');
  d.setDate(d.getDate() + (dayNum - 1));
  return d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
}

const weatherCache = {};

async function fetchAllWeather() {
  const locDates = new Map();
  const requests = [];
  tripIds.forEach(id => {
    trips[id].days.forEach((d, idx) => {
      const date = tripDate(d.day);
      const key = `${d.lat},${d.lng}`;
      requests.push({ tripId:id, dayIdx:idx, lat:d.lat, lng:d.lng, date });
      if (!locDates.has(key)) locDates.set(key, { lat:d.lat, lng:d.lng });
    });
  });

  const entries = [...locDates.entries()];
  const lats = entries.map(e => e[1].lat).join(',');
  const lngs = entries.map(e => e[1].lng).join(',');

  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lngs}&daily=temperature_2m_max,temperature_2m_min,weather_code&start_date=${TRIP_START}&end_date=${tripDate(9)}&timezone=auto`;
    const res = await fetch(url);
    const data = await res.json();
    const results = Array.isArray(data) ? data : [data];

    const lookup = {};
    entries.forEach(([key], i) => {
      const r = results[i];
      if (r && r.daily) lookup[key] = { dates:r.daily.time, highs:r.daily.temperature_2m_max, lows:r.daily.temperature_2m_min, codes:r.daily.weather_code };
    });

    requests.forEach(req => {
      const loc = lookup[`${req.lat},${req.lng}`];
      if (!loc) return;
      const dateIdx = loc.dates.indexOf(req.date);
      if (dateIdx === -1) return;
      weatherCache[`${req.tripId}-${req.dayIdx}`] = { high:Math.round(loc.highs[dateIdx]), low:Math.round(loc.lows[dateIdx]), code:loc.codes[dateIdx] };
    });
  } catch(err) { console.warn('Weather fetch failed:', err); }
  renderCards();
}

// ── STATE ─────────────────────────────────────────────
let isDark = true;
let isSatellite = false;
const visible = {};
tripIds.forEach(id => visible[id] = (id <= 2)); // show first two by default

// ── TILE LAYERS ───────────────────────────────────────
const tiles = {
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution:'&copy; OSM & CARTO', maxZoom:19 }),
  light: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution:'&copy; OSM & CARTO', maxZoom:19 }),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution:'&copy; Esri, Maxar, Earthstar', maxZoom:19 })
};

// ── MAP SETUP ─────────────────────────────────────────
const map = L.map('map', { zoomControl: false }).setView([48.5, 15], 6);
L.control.zoom({ position: 'topright' }).addTo(map);
tiles.dark.addTo(map);

function buildLegend() {
  if (map._legend) map.removeControl(map._legend);
  const legend = L.control({ position: 'bottomright' });
  legend.onAdd = function() {
    const div = L.DomUtil.create('div', 'legend');
    let html = '';
    tripIds.forEach(id => {
      const t = trips[id];
      const col = getColor(id);
      html += `<div><span class="dot" style="background:${col}"></span> ${t.name}</div>`;
    });
    html += `<div><span class="dot" style="background:#6ee7b7"></span> Cycling</div>`;
    html += `<div><span class="dot" style="background:#fbbf24"></span> Hiking</div>`;
    div.innerHTML = html;
    return div;
  };
  legend.addTo(map);
  map._legend = legend;
}
buildLegend();

// ── MAP LAYERS ────────────────────────────────────────
const layers = {};
tripIds.forEach(id => layers[id] = { line: null, markers: [] });

function getColor(tripId) {
  const t = trips[tripId];
  return (isDark || isSatellite) ? t.color : t.lightColor;
}

function buildLayers(tripId) {
  const trip = trips[tripId];
  const coords = trip.days.map(d => [d.lat, d.lng]);
  const col = getColor(tripId);

  layers[tripId].line = L.polyline(coords, {
    color: col, weight: 3.5, opacity: 0.8,
    dashArray: trip.dashArray
  }).addTo(map);

  trip.days.forEach((d, i) => {
    const hasCycling = d.tags.includes('cycling');
    const hasHiking = d.tags.includes('hiking');
    let ring = col;
    if (hasCycling) ring = '#059669';
    if (hasHiking && !hasCycling) ring = '#d97706';

    const icon = L.divIcon({
      className: '',
      html: `<div style="width:28px;height:28px;border-radius:50%;background:${col}22;border:2.5px solid ${ring};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:${col};font-family:system-ui;">${d.day}</div>`,
      iconSize: [28, 28], iconAnchor: [14, 14]
    });

    const marker = L.marker([d.lat, d.lng], { icon })
      .bindPopup(`<div style="font-family:system-ui;min-width:200px;">
        <strong style="color:${col}">Day ${d.day}</strong>
        <span style="color:#888;font-size:0.8em;margin-left:6px">${trip.name}</span>
        <div style="font-size:1.05em;font-weight:600;margin:4px 0">${d.place}</div>
        <div style="font-size:0.85em;color:#777;margin-bottom:4px">${d.drive}</div>
        <div style="font-size:0.85em;line-height:1.4">${d.desc}</div>
      </div>`)
      .addTo(map);
    layers[tripId].markers.push(marker);
  });
}

function clearLayers(tripId) {
  if (layers[tripId].line) map.removeLayer(layers[tripId].line);
  layers[tripId].markers.forEach(m => map.removeLayer(m));
  layers[tripId].line = null;
  layers[tripId].markers = [];
}

function rebuildAll() {
  tripIds.forEach(id => { clearLayers(id); if (visible[id]) buildLayers(id); });
  buildLegend();
}

tripIds.forEach(id => { if (visible[id]) buildLayers(id); });

// ── TOGGLE BUTTONS ────────────────────────────────────
function renderToggles() {
  const grid = document.getElementById('toggleGrid');
  grid.innerHTML = '';
  tripIds.forEach(id => {
    const t = trips[id];
    const mode = isDark ? 'dark' : 'light';
    const col = getColor(id);
    const btn = document.createElement('button');
    btn.className = 'toggle-btn' + (visible[id] ? ' active' : '');
    btn.style.setProperty('--tc', col);
    btn.style.setProperty('--tb', t.borderDim[mode]);
    btn.style.setProperty('--ta', visible[id] ? t.activeBg[mode] : 'transparent');
    btn.textContent = `Trip ${id} — ${t.name}`;
    btn.onclick = () => toggleTrip(id);
    grid.appendChild(btn);
  });
}
renderToggles();

// ── COMPARE TABLE ─────────────────────────────────────
function renderCompare() {
  const ct = document.getElementById('compareTable');
  const visibleIds = tripIds.filter(id => visible[id]);
  if (visibleIds.length === 0) { ct.innerHTML = ''; return; }

  const rows = [
    { label: 'Countries', fn: t => t.countries },
    { label: 'Total km', fn: t => t.totalKm },
    { label: 'Cycling', fn: t => t.cyclingDays + ' days' },
    { label: 'Hiking', fn: t => t.hikingDays + ' days' },
    { label: 'Drive days', fn: t => t.driveDays + ' days' },
  ];

  ct.innerHTML = rows.map(row =>
    `<div class="compare-bar">
      <div class="col label">${row.label}</div>
      ${visibleIds.map(id => `<div class="col" style="color:${getColor(id)}">${row.fn(trips[id])}</div>`).join('')}
    </div>`
  ).join('');
}
renderCompare();

// ── SIDEBAR CARDS ─────────────────────────────────────
function renderCards() {
  const list = document.getElementById('dayList');
  list.innerHTML = '';

  tripIds.forEach(tripId => {
    if (!visible[tripId]) return;
    const trip = trips[tripId];
    const col = getColor(tripId);

    const header = document.createElement('div');
    header.className = 'section-header';
    header.style.color = col;
    header.textContent = trip.name;
    list.appendChild(header);

    trip.days.forEach((d, i) => {
      const card = document.createElement('div');
      card.className = 'day-card';
      card.style.setProperty('--tc', col);
      const tagsHtml = d.tags.map(t => `<span class="tag ${t}">${t}</span>`).join('');

      const wKey = `${tripId}-${i}`;
      const w = weatherCache[wKey];
      const dateLabel = tripDateLabel(d.day);
      let weatherHtml;
      if (w) {
        const wmo = getWMO(w.code);
        weatherHtml = `<span class="weather-badge"><span class="wx-icon">${wmo.icon}</span> <span class="wx-temp">${w.high}°</span><span class="wx-range">/${w.low}°</span> ${wmo.label}</span>`;
      } else {
        weatherHtml = `<span class="weather-badge loading">loading…</span>`;
      }

      card.innerHTML = `
        <div class="day-header">
          <span class="day-num">Day ${d.day} <span class="day-date">${dateLabel}</span></span>
          ${weatherHtml}
          <span class="day-drive">${d.drive}</span>
        </div>
        <div class="day-place">${d.place}</div>
        <div class="day-desc">${d.desc}</div>
        <div class="activity-tags">${tagsHtml}</div>
      `;

      card.addEventListener('click', () => {
        document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        map.flyTo([d.lat, d.lng], 10, { duration: 0.8 });
        layers[tripId].markers[i].openPopup();
      });

      list.appendChild(card);
    });
  });
}
renderCards();

// ── TILE SWITCHING ────────────────────────────────────
function setTileLayer() {
  Object.values(tiles).forEach(t => { if (map.hasLayer(t)) map.removeLayer(t); });
  if (isSatellite) tiles.satellite.addTo(map);
  else if (isDark) tiles.dark.addTo(map);
  else tiles.light.addTo(map);
}

function toggleTheme() {
  isDark = !isDark;
  document.body.className = isDark ? 'dark' : 'light';
  document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙';
  document.getElementById('themeBtn').lastChild.textContent = isDark ? ' Light mode' : ' Dark mode';
  if (!isSatellite) setTileLayer();
  rebuildAll(); renderToggles(); renderCompare(); renderCards();
}

function toggleSatellite() {
  isSatellite = !isSatellite;
  document.getElementById('satBtn').classList.toggle('active-ctrl', isSatellite);
  setTileLayer();
  rebuildAll(); renderToggles(); renderCompare();
}

function toggleTrip(tripId) {
  visible[tripId] = !visible[tripId];
  if (visible[tripId]) buildLayers(tripId);
  else clearLayers(tripId);
  renderToggles(); renderCompare(); renderCards(); fitBounds();
}

function fitBounds() {
  const allCoords = [];
  tripIds.forEach(id => { if (visible[id]) trips[id].days.forEach(d => allCoords.push([d.lat, d.lng])); });
  if (allCoords.length) map.fitBounds(allCoords, { padding: [40, 40] });
}

fetchAllWeather();
</script>
